<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Register')}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>
<main class="container">
    <h1>Register</h1>

    <form class="card" th:action="@{/register}" th:object="${registerForm}" method="post">
        <div class="form-group">
            <label for="username">Username</label>
            <input id="username" type="text" th:field="*{username}">
            <p class="field-error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></p>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input id="email" type="email" th:field="*{email}">
            <p class="field-error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input id="password" type="password" th:field="*{password}">
            <p class="field-error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
        </div>
        <p class="field-error" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
        <button class="btn" type="submit">Create account</button>
    </form>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
