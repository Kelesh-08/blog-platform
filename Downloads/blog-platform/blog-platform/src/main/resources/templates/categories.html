<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Categories')}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>
<main class="container">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>

    <h1>Manage Categories</h1>

    <form class="card" th:action="@{/categories}" th:object="${categoryForm}" method="post">
        <h2>Create category</h2>
        <div class="form-group">
            <label for="name">Name</label>
            <input id="name" type="text" th:field="*{name}">
            <p class="field-error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></p>
        </div>
        <div class="form-group">
            <label for="description">Description</label>
            <input id="description" type="text" th:field="*{description}">
            <p class="field-error" th:if="${#fields.hasErrors('description')}" th:errors="*{description}"></p>
        </div>
        <p class="field-error" th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}"></p>
        <button class="btn" type="submit">Create</button>
    </form>

    <div class="card" th:each="category : ${categories}">
        <h3 th:text="${category.name}">Category</h3>
        <p th:text="${category.description}">Description</p>

        <p class="field-error"
           th:if="${editErrorId != null and editErrorId == category.id}"
           th:text="${editErrorMessage}"></p>

        <form th:action="@{/categories/{id}/edit(id=${category.id})}" method="post">
            <div class="grid-two">
                <div class="form-group">
                    <label th:for="${'edit-name-' + category.id}">Name</label>
                    <input th:id="${'edit-name-' + category.id}" type="text" name="name" th:value="${category.name}">
                </div>
                <div class="form-group">
                    <label th:for="${'edit-desc-' + category.id}">Description</label>
                    <input th:id="${'edit-desc-' + category.id}" type="text" name="description" th:value="${category.description}">
                </div>
            </div>
            <div class="actions">
                <button class="btn" type="submit">Update</button>
            </div>
        </form>
        <form class="inline-form" th:action="@{/categories/{id}/delete(id=${category.id})}" method="post">
            <button class="btn btn-danger" type="submit">Delete</button>
        </form>
    </div>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
