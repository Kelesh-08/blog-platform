<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Home')}"></head>
<body>
<div th:replace="~{fragments/layout :: header}"></div>
<main class="container">
    <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
    <h1>Latest Posts</h1>
    <p class="meta">Welcome to Blog Platform — read, comment, and share stories.</p>

    <div th:if="${#lists.isEmpty(posts)}" class="card">
        <p>No posts yet. Authors can publish the first story.</p>
    </div>

    <article class="card" th:each="post : ${posts}">
        <h2><a th:href="@{/posts/{id}(id=${post.id})}" th:text="${post.title}">Title</a></h2>
        <p class="meta">
            By <span th:text="${post.author.username}">author</span> |
            <span th:text="${post.category.name}">category</span> |
            <span th:text="${#temporals.format(post.createdAt, 'dd MMM yyyy HH:mm')}">date</span>
        </p>
        <p th:text="${#strings.abbreviate(post.content, 180)}">Preview</p>
    </article>

    <a class="btn" th:href="@{/posts}">View all posts</a>
</main>
<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
