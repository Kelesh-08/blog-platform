<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title} + ' | Blog Platform'">Blog Platform</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="site-header" th:fragment="header">
    <div class="container nav-bar">
        <a class="logo" th:href="@{/}">Blog Platform</a>
        <nav class="nav-links">
            <a th:href="@{/}">Home</a>
            <a th:href="@{/posts}">Posts</a>
            <a th:href="@{/about}">About</a>
            <a sec:authorize="hasAnyRole('AUTHOR','ADMIN')" th:href="@{/posts/create}">New Post</a>
            <a sec:authorize="hasRole('ADMIN')" th:href="@{/categories}">Categories</a>
            <a sec:authorize="isAnonymous()" th:href="@{/login}">Login</a>
            <a sec:authorize="isAnonymous()" th:href="@{/register}">Register</a>
            <form sec:authorize="isAuthenticated()" class="inline-form" th:action="@{/logout}" method="post">
                <button class="btn btn-secondary" type="submit">Logout</button>
            </form>
        </nav>
    </div>
</header>
<footer class="site-footer" th:fragment="footer">
    <div class="container">Spring Fundamentals Exam Project</div>
</footer>
</body>
</html>
